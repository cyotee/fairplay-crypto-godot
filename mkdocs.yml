site_name: ManaMesh FairPlay for Godot
site_description: MIT fair-play cryptography for Godot 4 — commit–reveal, mental poker, Merkle, shuffle integrity
site_url: https://cyotee.github.io/fairplay-crypto-godot/
repo_url: https://github.com/cyotee/fairplay-crypto-godot
repo_name: cyotee/fairplay-crypto-godot
edit_uri: edit/main/docs/
copyright: MIT · Copyright 2026 Cyotee Doge / ManaMesh

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - GDScript API: api.md
  - Commit–reveal: commit-reveal.md
  - Mental poker (SRA): mental-poker.md
  - Bring-your-own netcode: netcode.md
  - Threat model: threat-model.md
  - Platforms: platforms.md
  - Building from source: building.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cyotee/fairplay-crypto-godot
